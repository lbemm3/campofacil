<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampoFácil · Versão web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Public+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde: #345E3B;
    --verde-escuro: #223C27;
    --verde-claro: #5C8A62;
    --terra: #8B4226;
    --terra-clara: #B2643A;
    --trigo: #E3A93A;
    --trigo-escuro: #C68A22;
    --lona: #F2ECDA;
    --lona-alt: #E9E1C8;
    --tinta: #2A2118;
    --tinta-suave: #5A5041;
    --zinco: #7C8580;
    --zinco-claro: #D8DCD2;
    --branco: #FFFCF5;
    --perigo: #A6402D;
    --sucesso: #3F7D4A;
    --sombra: 0 18px 44px rgba(34,60,39,0.24);
    --sombra-sm: 0 4px 10px rgba(42,33,24,0.12);
    --raio-sm: 10px;
    --raio-md: 16px;
    --raio-lg: 26px;
    --fonte-titulo: 'Archivo', sans-serif;
    --fonte-corpo: 'Public Sans', sans-serif;
    --fonte-dados: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family: var(--fonte-corpo);
    color: var(--tinta);
    background: var(--lona);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input, textarea{ font-family:inherit; font-size:15px; }
  :focus-visible{ outline:3px solid var(--trigo); outline-offset:2px; border-radius:6px; }
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; } }
  .oculto{ display:none !important; }

  /* ================= LOGIN (página cheia) ================= */
  #pagina-login{
    position:fixed; inset:0; z-index:60;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    background-color: var(--verde-escuro);
    background-image:
      repeating-linear-gradient(155deg, rgba(255,255,255,0.045) 0px, rgba(255,255,255,0.045) 2px, transparent 2px, transparent 32px),
      linear-gradient(160deg, #3B6B43 0%, #1E3623 100%);
  }
  .cartao-login{
    background: var(--branco);
    width:100%; max-width:420px;
    border-radius: var(--raio-lg);
    padding:40px 34px;
    text-align:center;
    box-shadow: var(--sombra);
  }
  .cartao-login .selo-grande{
    width:74px; height:74px; margin:0 auto 18px;
    background: var(--trigo); border-radius:20px;
    display:flex; align-items:center; justify-content:center;
    color: var(--verde-escuro); transform: rotate(-5deg);
  }
  .cartao-login .selo-grande svg{ width:36px; height:36px; }
  .cartao-login h1{ font-family: var(--fonte-titulo); font-weight:900; font-size:27px; margin-bottom:8px; }
  .cartao-login .tagline{ color: var(--tinta-suave); font-size:14.5px; line-height:1.5; margin-bottom:26px; }

  /* ================= ESTRUTURA GERAL ================= */
  #aplicativo{ display:flex; height:100vh; }

  .barra-lateral{
    display:none;
    width:248px; flex-shrink:0;
    background: linear-gradient(180deg, var(--verde) 0%, var(--verde-escuro) 100%);
    color: var(--lona);
    flex-direction:column;
    padding:26px 18px;
  }
  .barra-lateral .lockup{ display:flex; align-items:center; gap:10px; padding:0 6px 30px; }
  .barra-lateral .lockup .selo-icone{ width:36px; height:36px; background:var(--trigo); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--verde-escuro); transform:rotate(-4deg); flex-shrink:0; }
  .barra-lateral .lockup .nome{ font-family:var(--fonte-titulo); font-weight:900; font-size:19px; }
  .barra-lateral .lockup .sub{ font-size:10.5px; font-family:var(--fonte-dados); text-transform:uppercase; letter-spacing:0.5px; color:rgba(242,236,218,0.65); }
  .nav-lateral{ display:flex; flex-direction:column; gap:4px; flex:1; }
  .nav-lateral button{ display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; font-weight:700; font-size:14.5px; color: rgba(242,236,218,0.8); text-align:left; transition: background 0.15s ease, color 0.15s ease; }
  .nav-lateral button svg{ width:19px; height:19px; flex-shrink:0; }
  .nav-lateral button:hover{ background: rgba(255,255,255,0.08); }
  .nav-lateral button.ativo{ background: rgba(255,255,255,0.16); color: var(--branco); }
  .rodape-lateral{ padding-top:16px; border-top:1px dashed rgba(242,236,218,0.25); }
  .rodape-lateral button{ display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:12px; font-weight:700; font-size:13.5px; color: rgba(242,236,218,0.68); width:100%; text-align:left; }
  .rodape-lateral button svg{ width:17px; height:17px; }
  .rodape-lateral button:hover{ background: rgba(255,255,255,0.08); color:var(--branco); }

  @media (min-width:900px){ .barra-lateral{ display:flex; } }

  .coluna-principal{ flex:1; min-width:0; display:flex; flex-direction:column; height:100vh; }

  .barra-topo{
    flex-shrink:0; display:flex; align-items:center; gap:16px;
    padding:16px 28px; background: var(--branco);
    border-bottom:1.5px solid var(--zinco-claro);
  }
  .barra-topo .logo-mobile{ display:flex; align-items:center; gap:9px; flex-shrink:0; }
  .barra-topo .logo-mobile .selo-icone{ width:32px; height:32px; background:var(--trigo); border-radius:9px; display:flex; align-items:center; justify-content:center; color:var(--verde-escuro); transform:rotate(-4deg); }
  .barra-topo .logo-mobile .nome{ font-family:var(--fonte-titulo); font-weight:900; font-size:16.5px; }
  @media (min-width:900px){ .barra-topo .logo-mobile{ display:none; } }

  .campo-busca-topo{
    flex:1; max-width:520px;
    display:flex; align-items:center; gap:10px;
    background: var(--lona-alt); border:1.5px solid var(--zinco-claro);
    border-radius: 999px; padding:11px 16px;
  }
  .campo-busca-topo svg{ width:18px; height:18px; color:var(--zinco); flex-shrink:0; }
  .campo-busca-topo input{ border:none; outline:none; background:transparent; flex:1; font-size:14.5px; color:var(--tinta); }
  .sino-topo{ width:38px; height:38px; border-radius:50%; background: var(--lona-alt); color:var(--verde); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .sino-topo svg{ width:19px; height:19px; }

  .area-conteudo{ flex:1; overflow-y:auto; padding: 30px 30px 110px; }
  @media (min-width:900px){ .area-conteudo{ padding: 34px 40px 40px; } }

  .painel-tela{ display:none; max-width:1180px; }
  .painel-tela.ativa{ display:block; animation: entra 0.22s ease; }
  @keyframes entra{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:translateY(0);} }

  .saudacao{ font-family: var(--fonte-titulo); font-weight:900; font-size:27px; margin-bottom:4px; }
  .legenda-muted{ color: var(--tinta-suave); font-size:14.5px; margin-bottom:26px; }
  .rotulo-secao{ font-family: var(--fonte-titulo); font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:0.6px; color: var(--terra); margin: 4px 0 14px; }

  .cabecalho-resultados{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
  .cabecalho-resultados h2{ font-family: var(--fonte-titulo); font-weight:800; font-size:19px; }
  .chip-limpar{ font-size:13px; font-weight:700; color: var(--verde); display:flex; align-items:center; gap:5px; }
  .chip-limpar svg{ width:15px; height:15px; }

  .grade-categorias{ display:grid; grid-template-columns: repeat(auto-fill, minmax(122px, 1fr)); gap:14px; margin-bottom:38px; max-width:1040px; }
  .cat-botao{
    background: var(--branco); border:1.5px solid var(--zinco-claro); border-radius: var(--raio-md);
    padding:18px 8px 14px; display:flex; flex-direction:column; align-items:center; gap:9px; text-align:center;
    transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease;
  }
  .cat-botao:hover{ border-color: var(--verde); box-shadow: var(--sombra-sm); transform: translateY(-2px); }
  .cat-botao:active{ transform: scale(0.96); }
  .cat-botao .ic{ width:46px; height:46px; border-radius:13px; background: var(--lona-alt); color: var(--verde); display:flex; align-items:center; justify-content:center; }
  .cat-botao .ic svg{ width:24px; height:24px; }
  .cat-botao .rot{ font-size:13px; font-weight:700; line-height:1.2; }

  .grade-prestadores{ display:grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap:16px; max-width:1200px; }

  .cartao-prestador{
    display:flex; gap:13px; background: var(--branco); border:1.5px solid var(--zinco-claro);
    border-radius: var(--raio-md); padding:16px; text-align:left; width:100%;
    transition: border-color 0.14s ease, transform 0.14s ease, box-shadow 0.14s ease;
  }
  .cartao-prestador:hover{ border-color: var(--verde); box-shadow: var(--sombra-sm); transform: translateY(-2px); }
  .cartao-prestador:active{ transform: scale(0.98); }
  .avatar{ width:52px; height:52px; border-radius:50%; background: var(--verde); color: var(--lona); font-family: var(--fonte-titulo); font-weight:800; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .info-prestador{ flex:1; min-width:0; }
  .info-prestador .linha1{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .info-prestador .nome{ font-weight:800; font-size:15px; }
  .info-prestador .categoria-tag{ font-size:12px; color: var(--tinta-suave); margin-top:1px; }
  .info-prestador .meta{ display:flex; align-items:center; gap:10px; margin-top:8px; font-size:12.5px; color: var(--tinta-suave); flex-wrap:wrap; }
  .info-prestador .meta .item{ display:flex; align-items:center; gap:4px; }
  .info-prestador .meta svg{ width:14px; height:14px; }
  .estrela{ color: var(--trigo-escuro); }

  .selo-verificado{ display:inline-flex; align-items:center; gap:4px; background: var(--terra); color: var(--branco); font-size:10px; font-weight:800; padding:3px 8px 3px 6px; border-radius:999px; border:1px dashed rgba(255,252,245,0.55); transform: rotate(-3deg); letter-spacing:0.3px; text-transform:uppercase; flex-shrink:0; }
  .selo-verificado svg{ width:11px; height:11px; }

  .estado-vazio{ text-align:center; padding: 60px 14px; color: var(--tinta-suave); }
  .estado-vazio .ic{ width:68px; height:68px; margin:0 auto 18px; border-radius:50%; background: var(--lona-alt); color: var(--terra); display:flex; align-items:center; justify-content:center; }
  .estado-vazio .ic svg{ width:32px; height:32px; }
  .estado-vazio p{ font-size:14.5px; line-height:1.55; max-width:340px; margin:0 auto 20px; }

  .botao{ display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:14px 22px; border-radius:999px; font-weight:800; font-size:14.5px; transition: transform 0.12s ease, filter 0.12s ease; }
  .botao:active{ transform: scale(0.97); }
  .botao svg{ width:18px; height:18px; }
  .botao-primario{ background: var(--verde); color: var(--branco); }
  .botao-primario:hover{ filter: brightness(1.08); }
  .botao-trigo{ background: var(--trigo); color: var(--verde-escuro); width:100%; }
  .botao-trigo:hover{ filter: brightness(1.05); }
  .botao-secundario{ background: var(--lona-alt); color: var(--tinta); border:1.5px solid var(--zinco-claro); }
  .botao-bloco{ width:100%; }

  .cartao{ background: var(--branco); border:1.5px solid var(--zinco-claro); border-radius: var(--raio-md); padding:16px; margin-bottom:14px; }
  .linha-tracejada{ border-top:1.5px dashed var(--zinco-claro); margin:16px 0; }

  .grupo-campo{ margin-bottom:16px; text-align:left; }
  .grupo-campo label{ display:block; font-size:12.5px; font-weight:700; color: var(--tinta-suave); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px; }
  .grupo-campo input, .grupo-campo textarea{ width:100%; border:1.5px solid var(--zinco-claro); border-radius: var(--raio-sm); padding:12px 13px; background: var(--branco); color: var(--tinta); }
  .grupo-campo input:focus, .grupo-campo textarea:focus{ border-color: var(--verde); outline:none; }
  .grupo-campo textarea{ resize:vertical; min-height:74px; }
  .grade-servicos-extras{ display:grid; grid-template-columns:1fr 1fr; gap:2px 16px; }
  @media (max-width:420px){ .grade-servicos-extras{ grid-template-columns:1fr; } }
  .item-servico-extra{ display:flex !important; align-items:center; gap:8px; padding:7px 0; text-transform:none !important; font-size:14px !important; font-weight:600; letter-spacing:normal !important; color:var(--tinta); cursor:pointer; }
  .item-servico-extra input{ width:auto !important; flex-shrink:0; margin:0; }

  .capa-perfil{ background: linear-gradient(135deg, var(--verde) 0%, var(--verde-escuro) 100%); border-radius: var(--raio-lg); padding:22px 20px; color: var(--lona); margin-bottom:18px; position:relative; overflow:hidden; }
  .capa-perfil::after{ content:""; position:absolute; inset:0; background-image: repeating-linear-gradient(120deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 22px); }
  .capa-perfil .conteudo{ position:relative; display:flex; gap:14px; align-items:center; text-align:left; }
  .capa-perfil .avatar{ width:64px; height:64px; font-size:22px; background: var(--trigo); color: var(--verde-escuro); border:3px solid rgba(255,252,245,0.4); }
  .capa-perfil .nome{ font-family: var(--fonte-titulo); font-weight:800; font-size:19px; }
  .capa-perfil .categoria-tag{ color: rgba(242,236,218,0.82); font-size:13px; margin-top:2px; }

  .grade-acoes-contato{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }

  .medidor-pedido{ display:flex; gap:18px; align-items:stretch; padding: 6px 4px 14px; text-align:left; }
  .silo{ width:18px; border-radius:9px; background: repeating-linear-gradient(0deg, var(--zinco-claro) 0px, var(--zinco-claro) 6px, #EDF0E9 6px, #EDF0E9 7px); border:1.5px solid var(--zinco-claro); position:relative; overflow:hidden; flex-shrink:0; }
  .silo .enchimento{ position:absolute; left:0; right:0; bottom:0; background: linear-gradient(180deg, var(--trigo) 0%, var(--verde) 100%); height:0%; transition: height 0.7s cubic-bezier(.4,0,.2,1); border-radius:0 0 8px 8px; }
  .etapas-pedido{ flex:1; display:flex; flex-direction:column; justify-content:space-between; }
  .etapa{ display:flex; align-items:center; gap:10px; }
  .etapa .bolinha{ width:26px; height:26px; border-radius:50%; border:2px solid var(--zinco-claro); display:flex; align-items:center; justify-content:center; color:transparent; flex-shrink:0; transition: all 0.25s ease; }
  .etapa .bolinha svg{ width:14px; height:14px; }
  .etapa.feita .bolinha{ background: var(--verde); border-color: var(--verde); color: var(--branco); }
  .etapa.atual .bolinha{ background: var(--trigo); border-color: var(--trigo-escuro); color: var(--verde-escuro); }
  .etapa .texto .t{ font-weight:800; font-size:14px; }
  .etapa .texto .d{ font-size:12px; color: var(--tinta-suave); }
  .etapa:not(.feita):not(.atual) .texto .t{ color: var(--zinco); }

  .pedido-resumo{ background: var(--lona-alt); border-radius: var(--raio-md); padding:14px; margin-bottom:18px; font-size:13.5px; text-align:left; }
  .pedido-resumo .linha{ display:flex; justify-content:space-between; padding:5px 0; gap:12px; }
  .pedido-resumo .linha .k{ color: var(--tinta-suave); flex-shrink:0; }
  .pedido-resumo .linha .v{ font-weight:700; text-align:right; }

  .grade-pedidos{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap:16px; max-width:1200px; }
  .cartao-pedido{ display:flex; align-items:center; gap:12px; background: var(--branco); border:1.5px solid var(--zinco-claro); border-radius: var(--raio-md); padding:15px; width:100%; text-align:left; transition: border-color 0.14s ease, transform 0.14s ease; }
  .cartao-pedido:hover{ border-color: var(--verde); transform: translateY(-2px); }
  .cartao-pedido .ic-cat{ width:42px; height:42px; border-radius:11px; background: var(--lona-alt); color: var(--verde); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .cartao-pedido .ic-cat svg{ width:22px; height:22px; }
  .cartao-pedido .miolo{ flex:1; min-width:0; }
  .cartao-pedido .titulo-pedido{ font-weight:800; font-size:14.5px; }
  .cartao-pedido .sub-pedido{ font-size:12.5px; color: var(--tinta-suave); margin-top:2px; }
  .badge-status{ font-size:11px; font-weight:800; padding:4px 10px; border-radius:999px; white-space:nowrap; }
  .badge-solicitado{ background:#F3E3C9; color:#8A6114; }
  .badge-aceito{ background:#DCEBDD; color:#2B5E33; }
  .badge-a_caminho{ background:#DCE7EE; color:#2A5877; }
  .badge-concluido{ background:#E2E7DC; color:#4B5940; }
  .badge-recusado{ background:#F5DCDC; color:#8A2B2B; }
  .badge-cancelado{ background:#E7E4DF; color:#6B6559; }

  .container-perfil-conta{ max-width:560px; }
  .cartao-conta{ display:flex; align-items:center; gap:14px; background: var(--branco); border:1.5px solid var(--zinco-claro); border-radius: var(--raio-md); padding:18px; margin-bottom:20px; }
  .cartao-conta .avatar{ width:58px; height:58px; font-size:20px; }
  .cartao-conta .nome{ font-weight:800; font-size:16px; }
  .cartao-conta .local{ font-size:13px; color: var(--tinta-suave); margin-top:2px; }
  .linha-menu{ display:flex; align-items:center; gap:12px; padding:14px 4px; border-bottom:1px dashed var(--zinco-claro); width:100%; text-align:left; }
  .linha-menu:last-child{ border-bottom:none; }
  .linha-menu .ic{ width:34px; height:34px; border-radius:10px; background: var(--lona-alt); color: var(--verde); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .linha-menu .ic svg{ width:18px; height:18px; }
  .linha-menu .txt{ flex:1; font-weight:700; font-size:14.5px; }
  .botao-perigo-fino{ background:transparent; color: var(--perigo); font-size:13px; font-weight:700; margin-top:8px; display:inline-flex; align-items:center; gap:6px; }

  /* ================= NAV INFERIOR (mobile) ================= */
  .nav-inferior-mobile{ display:flex; position:fixed; left:0; right:0; bottom:0; z-index:30; background: var(--branco); border-top:1px dashed var(--zinco-claro); padding: 8px 6px calc(env(safe-area-inset-bottom, 8px) + 8px); }
  @media (min-width:900px){ .nav-inferior-mobile{ display:none; } }
  .nav-inferior-mobile button{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0; font-size:11px; font-weight:700; color: var(--zinco); border-radius:12px; }
  .nav-inferior-mobile button svg{ width:21px; height:21px; }
  .nav-inferior-mobile button.ativo{ color: var(--verde); background: rgba(52,94,59,0.09); }

  /* ================= MODAL ================= */
  #camada-modal{ position:fixed; inset:0; z-index:70; display:none; align-items:center; justify-content:center; padding:22px; background: rgba(20,26,16,0.5); }
  #camada-modal.ativo{ display:flex; }
  .modal{ position:relative; background: var(--branco); width:100%; max-width:480px; max-height:88vh; overflow-y:auto; border-radius: var(--raio-lg); box-shadow: var(--sombra); padding:24px 22px 28px; text-align:center; }
  .modal .fechar-modal{ position:absolute; top:14px; right:14px; width:34px; height:34px; border-radius:50%; background: var(--lona-alt); color:var(--tinta); display:flex; align-items:center; justify-content:center; z-index:2; }
  .modal .fechar-modal svg{ width:17px; height:17px; }
  @media (max-width:640px){
    #camada-modal{ align-items:flex-end; padding:0; }
    .modal{ max-width:100%; border-radius: 26px 26px 0 0; max-height:92vh; animation: subir 0.25s ease; }
  }
  @keyframes subir{ from{ transform: translateY(26px); opacity:0.4; } to{ transform: translateY(0); opacity:1; } }

  /* ================= PAINEL ADMINISTRATIVO ================= */
  #pagina-admin{ position:fixed; inset:0; z-index:55; display:none; background: var(--lona); overflow-y:auto; }
  #pagina-admin.ativo{ display:block; }
  .miolo-admin{ max-width:1180px; margin:0 auto; padding: 26px 28px 60px; }
  .barra-voltar-admin{ display:flex; align-items:center; gap:10px; padding:16px 28px; background:var(--branco); border-bottom:1.5px solid var(--zinco-claro); position:sticky; top:0; z-index:2; }

<div id="pagina-login">

/* ======================= DISTÂNCIA REAL (GEOLOCALIZAÇÃO) ======================= */
// Coordenadas aproximadas das cidades da região noroeste do RS que já aparecem
// no app. Servem para calcular a distância mesmo sem o prestador ter GPS.
const CIDADES_COORDS = {
  'ijuí': { lat:-28.3875, lon:-53.9147 },
  'panambi': { lat:-28.2925, lon:-53.5017 },
  'santa rosa': { lat:-27.8719, lon:-54.4806 },
  'três de maio': { lat:-27.7847, lon:-54.2408 },
  'cruz alta': { lat:-28.6389, lon:-53.6064 },
  'palmeira das missões': { lat:-27.9006, lon:-53.3128 },
  'campina das missões': { lat:-27.7211, lon:-54.8372 },
  'ajuricaba': { lat:-28.2394, lon:-53.7669 },
  'coronel barros': { lat:-28.35, lon:-54.05 },
  'catuípe': { lat:-28.2417, lon:-54.0656 },
};

function normalizarCidade(c){ return (c || '').trim().toLowerCase(); }

function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function obterLocalizacaoAgricultor(){
  return new Promise(resolve => {
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
      () => resolve(null),
      { timeout: 8000 }
    );
  });
}

function atualizarDistancias(){
  if(!agricultorCoords) return;
  PRESTADORES.forEach(p => {
    const coordCidade = CIDADES_COORDS[normalizarCidade(p.cidade)];
    if(coordCidade){
      const km = haversineKm(agricultorCoords.lat, agricultorCoords.lon, coordCidade.lat, coordCidade.lon);
      p.dist = Math.round(km) + ' km';
    }
  });
}

// Pede a localização em segundo plano (sem travar o app esperando a resposta)

async function atualizarLocalizacaoEDistancias(){

  atualizarDistancias();

}

function traduzErroAuth(msg){
  if(/Invalid login credentials/i.test(msg)) return 'E-mail ou senha incorretos.';
  if(/User already registered/i.test(msg)) return 'Já existe uma conta com esse e-mail. Tente entrar em vez de criar conta.';
  if(/Email not confirmed/i.test(msg)) return 'Confirme seu e-mail antes de entrar (veja sua caixa de entrada).';
  if(/Password should be at least/i.test(msg)) return 'A senha precisa ter pelo menos 6 caracteres.';
  return msg;
}

let raioFiltroKm = null;

function distanciaKm(p){
  if(!p.dist || p.dist === '—') return null;
  const n = parseInt(p.dist, 10);
  return isNaN(n) ? null : n;
}

function renderBlocosInicio(){
  const blocoCat = document.getElementById('bloco-categorias');
  const blocoRes = document.getElementById('bloco-resultados');

  if(!filtro){
    const maisUsadas = MAIS_USADAS.map(id=>CATEGORIAS.find(c=>c.id===id));
    let html = (agricultorCoords ? '<div style="display:flex;justify-content:flex-end;margin-bottom:10px">'+seletorRaioHTML()+'</div>' : '') + blocoGrupoWeb('Mais usadas', maisUsadas);
    GRUPOS.forEach(g=>{
      const itens = CATEGORIAS.filter(c=>c.grupo===g.id);
      if(itens.length) html += blocoGrupoWeb(g.rot, itens);
    });
    blocoCat.innerHTML = html;
    let destaque = PRESTADORES.filter(p=>p.verificado);
    if(raioFiltroKm !== null && agricultorCoords){
      destaque = destaque.filter(p => { const d = distanciaKm(p); return d !== null && d <= raioFiltroKm; });
    }
    destaque = destaque.sort((a,b)=>b.nota-a.nota).slice(0,4);
    blocoRes.innerHTML =
      '<div class="rotulo-secao">Prestadores em destaque</div>'
      + '<div class="grade-prestadores">' + destaque.map(cartaoPrestadorHTML).join('') + '</div>';
    return;
  }

  blocoCat.innerHTML = '';
  let lista, titulo;
  if(filtro.tipo === 'categoria'){
    lista = PRESTADORES.filter(p=>p.cat===filtro.id || p.catsExtras.includes(filtro.id));
    titulo = catInfo(filtro.id).rot;
  } else {
    const termo = filtro.termo;
    lista = PRESTADORES.filter(p => p.nome.toLowerCase().includes(termo) || catInfo(p.cat).rot.toLowerCase().includes(termo) || p.cidade.toLowerCase().includes(termo));
    titulo = 'Resultados para "'+filtro.termo+'"';
  }

  if(raioFiltroKm !== null && agricultorCoords){
    lista = lista.filter(p => { const d = distanciaKm(p); return d !== null && d <= raioFiltroKm; });
  }

  let corpo;
  if(lista.length === 0){
    corpo = '<div class="estado-vazio"><div class="ic">'+iconeInline('busca',28)+'</div>'
      + '<p>Nenhum prestador encontrado para "'+titulo+'" nessa região. Tente outra categoria, aumente o raio ou peça indicação à cooperativa local.</p></div>';
  } else {
    corpo = '<div class="grade-prestadores">' + lista.sort((a,b)=>b.nota-a.nota).map(cartaoPrestadorHTML).join('') + '</div>';
  }

  blocoRes.innerHTML =
    '<div class="cabecalho-resultados"><h2>'+titulo+'</h2>'
    + '<div style="display:flex;gap:8px;align-items:center">'+seletorRaioHTML()+'<button class="chip-limpar" onclick="limparFiltro()">'+iconeInline('fechar',15)+' Limpar</button></div></div>'
    + corpo;
}

function cartaoPrestadorHTML(p){
  const c = catInfo(p.cat);
  return '<button class="cartao-prestador" onclick="abrirPerfilPrestador('+p.id+')">'
    + avatarHTML(p.nome, p.fotoUrl)
    + '<div class="info-prestador">'
      + '<div class="linha1"><span class="nome">'+p.nome+'</span>'+(p.verificado?'<span class="selo-verificado">'+iconeInline('check',10)+'Verif.</span>':'')+'</div>'
      + '<div class="categoria-tag">'+c.rot+(p.catsExtras.length ? ' +'+p.catsExtras.length : '')+' · '+p.cidade+'</div>'
      + '<div class="meta"><span class="item estrela">'+iconeInline('estrela',14)+' '+p.nota.toFixed(1)+' ('+p.avaliacoes+')</span><span class="item">'+iconeInline('pino',14)+' '+p.dist+'</span></div>'
    + '</div></button>';
}

function abrirCategoria(id){
  filtro = { tipo:'categoria', id:id };
  trocarAba('tela-inicio');
  renderBlocosInicio();
}
function buscar(texto){
  texto = texto.trim().toLowerCase();
  if(!texto){ if(filtro && filtro.tipo==='busca'){ filtro=null; trocarAba('tela-inicio'); renderBlocosInicio(); } return; }
  filtro = { tipo:'busca', termo:texto };
  trocarAba('tela-inicio');
  renderBlocosInicio();
}
function limparFiltro(){ filtro = null; renderBlocosInicio(); }

/* ======================= MODAL: PERFIL / SOLICITAR / ACOMPANHAR ======================= */
function abrirModal(){ document.getElementById('camada-modal').classList.add('ativo'); }
function fecharModal(){ document.getElementById('camada-modal').classList.remove('ativo'); }

function escaparHTML(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function abrirPerfilPrestador(id){
  prestadorAtual = PRESTADORES.find(p=>p.id===id);
  renderModalPerfil();
  abrirModal();
  carregarComentariosPrestador(id);
}

function compartilharPerfil(){
  const link = window.location.origin + window.location.pathname + '?prestador=' + prestadorAtual.id;
  const msg = 'Confira ' + prestadorAtual.nome + ' (' + catInfo(prestadorAtual.cat).rot + ') no CampoFácil: ' + link;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}
function renderModalPerfil(){
  const p = prestadorAtual, c = catInfo(p.cat);
  document.getElementById('conteudo-modal').innerHTML =
    '<div class="capa-perfil"><div class="conteudo">'
      + avatarHTML(p.nome, p.fotoUrl)
      + '<div><div class="nome">'+p.nome+'</div><div class="categoria-tag">'+c.rot+' · '+p.cidade+'</div>'
      + (p.verificado ? '<span class="selo-verificado" style="margin-top:8px">'+iconeInline('check',10)+'Verificado</span>' : '')
      + '</div></div></div>'
    + '<div class="cartao"><div class="meta" style="margin-top:0"><span class="item estrela">'+iconeInline('estrela',14)+' '+p.nota.toFixed(1)+' de nota ('+p.avaliacoes+' avaliações)</span></div>'
      + '<div class="linha-tracejada"></div>'
      + '<div class="meta"><span class="item">'+iconeInline('check',14)+' '+p.servicosConcluidos+' serviço'+(p.servicosConcluidos===1?'':'s')+' concluído'+(p.servicosConcluidos===1?'':'s')+'</span></div>'
      + '<div class="linha-tracejada"></div>'
      + '<div class="meta"><span class="item">'+iconeInline('pino',14)+' Atende num raio de '+p.raio+' km a partir de '+p.cidade+'</span></div></div>'
    + '<div class="rotulo-secao">Serviços oferecidos</div>'
    + '<div class="cartao">' + [c.rot].concat(p.catsExtras.map(id=>catInfo(id).rot)).join(' · ') + ', a combinar conforme a necessidade da propriedade.</div>'
    + '<div class="rotulo-secao">Avaliações recentes</div>'
    + '<div id="lista-avaliacoes-prestador"><div class="legenda-muted">Carregando avaliações...</div></div>'
    + '<button class="botao botao-secundario botao-bloco" onclick="compartilharPerfil()">'+iconeInline('whats',18)+' Compartilhar perfil</button>'
    + '<button class="botao botao-trigo" onclick="abrirSolicitacao()">Solicitar serviço</button>';
}

async function carregarComentariosPrestador(prestadorId){
  const { data, error } = await sb.from('avaliacoes')
    .select('nota, comentario, criado_em')
    .eq('prestador_id', prestadorId)
    .order('criado_em', { ascending:false })
    .limit(20);

  const alvo = document.getElementById('lista-avaliacoes-prestador');
  if(!alvo) return; // a pessoa já fechou o modal antes de terminar de carregar

  if(error){
    alvo.innerHTML = '<div class="legenda-muted">Não foi possível carregar as avaliações.</div>';
    return;
  }

  const comComentario = data.filter(a => a.comentario && a.comentario.trim());
  if(comComentario.length === 0){
    alvo.innerHTML = '<div class="legenda-muted">Ainda não há comentários — só notas.</div>';
    return;
  }

  alvo.innerHTML = comComentario.map(a=>{
    const estrelas = '★'.repeat(a.nota) + '☆'.repeat(5 - a.nota);
    return '<div class="cartao" style="margin-bottom:8px">'
      + '<div style="color:var(--trigo);letter-spacing:2px;font-size:14px">'+estrelas+'</div>'
      + '<div class="legenda-muted" style="margin-top:4px">'+escaparHTML(a.comentario)+'</div>'
      + '</div>';
  }).join('');
}

let localizacaoCapturada = null;

function linkMapa(lat, lon){ return 'https://www.google.com/maps?q=' + lat + ',' + lon; }

function abrirSolicitacao(){
  const p = prestadorAtual;
  const meta = usuarioAtual.user_metadata || {};
  const temPropriedadeSalva = meta.propriedadeLat != null && meta.propriedadeLon != null;
  localizacaoCapturada = temPropriedadeSalva ? { lat: meta.propriedadeLat, lon: meta.propriedadeLon } : null;

  const categoriasDoPrestador = [p.cat, ...p.catsExtras];
  const categoriaPreSelecionada = (filtro && filtro.tipo === 'categoria' && categoriasDoPrestador.includes(filtro.id)) ? filtro.id : p.cat;
  const seletorServico = categoriasDoPrestador.length > 1
    ? '<div class="grupo-campo"><label for="campo-servico-pedido">Qual serviço você precisa?</label>'
      + '<select id="campo-servico-pedido" style="width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--zinco-claro);font-size:15px">'
        + categoriasDoPrestador.map(id=>'<option value="'+id+'" '+(id===categoriaPreSelecionada?'selected':'')+'>'+catInfo(id).rot+'</option>').join('')
      + '</select></div>'
    : '<input type="hidden" id="campo-servico-pedido" value="'+p.cat+'">';

  document.getElementById('conteudo-modal').innerHTML =
    '<div class="rotulo-secao" style="margin-top:0">Solicitar serviço</div>'
    + '<div class="legenda-muted" style="margin-bottom:20px">Prestador: <strong style="color:var(--tinta)">'+p.nome+'</strong></div>'
    + seletorServico
    + '<div class="grupo-campo"><label for="campo-local">Local do serviço</label><input id="campo-local" type="text" placeholder="Ex.: Linha São José, propriedade km 4" value="'+(meta.propriedadeLocal || 'Minha propriedade')+'"></div>'
    + '<div class="grupo-campo"><label for="campo-tel-agricultor">Seu telefone (para o prestador combinar detalhes)</label><input id="campo-tel-agricultor" type="text" value="'+(meta.telefone || '')+'" placeholder="(55) 9 9999-9999"></div>'
    + '<div class="grupo-campo"><label>Localização exata (opcional, recomendado para propriedades rurais)</label>'
      + '<button type="button" class="botao botao-secundario botao-bloco" onclick="capturarLocalizacaoPedido()">'+iconeInline('pino',18)+' Usar minha localização atual (GPS)</button>'
      + '<div id="status-local-gps" class="legenda-muted" style="margin-top:6px">'
        + (temPropriedadeSalva ? iconeInline('check',13)+' Usando a localização salva da sua propriedade — <a href="'+linkMapa(meta.propriedadeLat, meta.propriedadeLon)+'" target="_blank" rel="noopener">ver no mapa</a>' : 'Use este botão estando na propriedade, ou peça pra alguém que esteja lá abrir o app.')
      + '</div>'
    + '</div>'
    + '<div class="grupo-campo"><label for="campo-data">Data desejada</label><input id="campo-data" type="date"></div>'
    + '<div class="grupo-campo"><label for="campo-obs">Observações</label><textarea id="campo-obs" placeholder="Descreva o que precisa, tamanho da área, urgência etc."></textarea></div>'
    + '<button class="botao botao-primario botao-bloco" onclick="enviarPedido()">Enviar pedido</button>';
}

function capturarLocalizacaoPedido(){
  const status = document.getElementById('status-local-gps');
  if(!navigator.geolocation){
    status.textContent = 'Seu navegador não suporta captura de localização.';
    status.style.color = 'var(--perigo)';
    return;
  }
  status.textContent = 'Obtendo localização...';
  status.style.color = 'var(--tinta-suave)';
  navigator.geolocation.getCurrentPosition(
    pos => {
      localizacaoCapturada = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      status.innerHTML = iconeInline('check',13) + ' Localização capturada — <a href="'+linkMapa(localizacaoCapturada.lat, localizacaoCapturada.lon)+'" target="_blank" rel="noopener">ver no mapa</a>';
      status.style.color = 'var(--tinta)';
    },
    () => {
      status.textContent = 'Não foi possível obter a localização. Verifique a permissão de GPS do navegador.';
      status.style.color = 'var(--perigo)';
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

function linkWhatsApp(telefone, mensagem){
  let digitos = (telefone || '').replace(/\D/g, '');
  if(!digitos) return null;
  if(digitos.length <= 11) digitos = '55' + digitos;
  return 'https://wa.me/' + digitos + '?text=' + encodeURIComponent(mensagem);
}

async function carregarPedidos(){
  const { data, error } = await sb.from('pedidos').select('*').order('criado_em', { ascending:false });
  if(error){ console.error('Erro ao carregar pedidos:', error); return; }
  PEDIDOS = data.map(p => ({
    id:p.id, prestadorId:p.prestador_id, cat:p.categoria_id, local:p.local,
    data:p.data_desejada, obs:p.observacoes, status:p.status,
    criadoEm:p.criado_em, agricultorUserId:p.agricultor_user_id,
    latitude:p.latitude, longitude:p.longitude, agricultorTelefone:p.agricultor_telefone,
    motivoRecusa:p.motivo_recusa
  }));
  await carregarAvaliacoesFeitas();
}

async function carregarAvaliacoesFeitas(){
  if(!usuarioAtual) return;
  const { data, error } = await sb.from('avaliacoes').select('pedido_id').eq('agricultor_user_id', usuarioAtual.id);
  if(error){ console.error('Erro ao carregar avaliações:', error); return; }
  PEDIDOS_AVALIADOS = new Set(data.map(a => a.pedido_id));
}

function abrirEdicaoPedido(){
  const pedido = pedidoPorId(pedidoAtualId);
  const p = PRESTADORES.find(pr=>pr.id===pedido.prestadorId);
  const categoriasDoPrestador = p ? [p.cat, ...p.catsExtras] : [pedido.cat];
  const seletorServico = categoriasDoPrestador.length > 1
    ? '<div class="grupo-campo"><label for="campo-servico-pedido">Serviço</label>'
      + '<select id="campo-servico-pedido" style="width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--zinco-claro);font-size:15px">'
        + categoriasDoPrestador.map(id=>'<option value="'+id+'" '+(id===pedido.cat?'selected':'')+'>'+catInfo(id).rot+'</option>').join('')
      + '</select></div>'
    : '<input type="hidden" id="campo-servico-pedido" value="'+pedido.cat+'">';

  document.getElementById('conteudo-modal').innerHTML =
    '<div class="rotulo-secao" style="margin-top:0">Editar pedido</div>'
    + seletorServico
    + '<div class="grupo-campo"><label for="campo-local">Local do serviço</label><input id="campo-local" type="text" value="'+pedido.local+'"></div>'
    + '<div class="grupo-campo"><label for="campo-tel-agricultor">Seu telefone</label><input id="campo-tel-agricultor" type="text" value="'+(pedido.agricultorTelefone||'')+'" placeholder="(55) 9 9999-9999"></div>'
    + '<div class="grupo-campo"><label for="campo-data">Data desejada</label><input id="campo-data" type="date" value="'+(pedido.data||'')+'"></div>'
    + '<div class="grupo-campo"><label for="campo-obs">Observações</label><textarea id="campo-obs" placeholder="Descreva o que precisa">'+(pedido.obs||'')+'</textarea></div>'
    + '<div id="mensagem-edicao-pedido" class="legenda-muted" style="min-height:18px"></div>'
    + '<button class="botao botao-primario botao-bloco" onclick="salvarEdicaoPedido()">Salvar alterações</button>';
}

async function salvarEdicaoPedido(){
  const pedido = pedidoPorId(pedidoAtualId);
  const local = document.getElementById('campo-local').value || 'Minha propriedade';
  const telAgricultor = document.getElementById('campo-tel-agricultor').value.trim();
  const data = document.getElementById('campo-data').value;
  const obs = document.getElementById('campo-obs').value;
  const categoriaEscolhida = document.getElementById('campo-servico-pedido').value;
  const msg = document.getElementById('mensagem-edicao-pedido');

  msg.textContent = 'Salvando...';
  msg.style.color = 'var(--tinta-suave)';

  const { data: atualizado, error } = await sb.from('pedidos')
    .update({ local, categoria_id: categoriaEscolhida, agricultor_telefone: telAgricultor || null, data_desejada: data || null, observacoes: obs })
    .eq('id', pedido.id)
    .select()
    .maybeSingle();

  if(error){
    msg.textContent = 'Não foi possível salvar: ' + error.message;
    msg.style.color = 'var(--perigo)';
    return;
  }

  pedido.local = atualizado.local;
  pedido.cat = atualizado.categoria_id;
  pedido.agricultorTelefone = atualizado.agricultor_telefone;
  pedido.data = atualizado.data_desejada;
  pedido.obs = atualizado.observacoes;
  renderModalAcompanhar();
}

async function enviarPedido(){
  const local = document.getElementById('campo-local').value || 'Minha propriedade';
  const telAgricultor = document.getElementById('campo-tel-agricultor').value.trim();
  const data = document.getElementById('campo-data').value;
  const obs = document.getElementById('campo-obs').value;
  const categoriaEscolhida = document.getElementById('campo-servico-pedido').value;

  const { data: novo, error } = await sb.from('pedidos').insert({
    prestador_id: prestadorAtual.id, categoria_id: categoriaEscolhida,
    local, data_desejada: data || null, observacoes: obs,
    status: 'solicitado', agricultor_user_id: usuarioAtual.id,
    latitude: localizacaoCapturada ? localizacaoCapturada.lat : null,
    longitude: localizacaoCapturada ? localizacaoCapturada.lon : null,
    agricultor_telefone: telAgricultor || null
  }).select().maybeSingle();

  if(error){ alert('Não foi possível enviar o pedido: ' + error.message); return; }

  const pedido = {
    id:novo.id, prestadorId:novo.prestador_id, cat:novo.categoria_id, local:novo.local,
    data:novo.data_desejada, obs:novo.observacoes, status:novo.status,
    criadoEm:novo.criado_em, agricultorUserId:novo.agricultor_user_id,
    latitude:novo.latitude, longitude:novo.longitude, agricultorTelefone:novo.agricultor_telefone
  };
  PEDIDOS.unshift(pedido);
  pedidoAtualId = pedido.id;
  renderModalAcompanhar();
}

function pedidoPorId(id){ return PEDIDOS.find(p=>p.id===id); }
function proximaEtapa(status){ const idx = ETAPAS_PEDIDO.findIndex(e=>e.id===status); return idx < ETAPAS_PEDIDO.length-1 ? ETAPAS_PEDIDO[idx+1].id : status; }

const STATUS_TERMINAIS_NEGATIVOS = {
  recusado: { rot:'Recusado', cor:'var(--perigo)', msg:'O prestador recusou este pedido.' },
  cancelado: { rot:'Cancelado', cor:'#6B6559', msg:'Este pedido foi cancelado pelo agricultor.' },
};

async function atualizarStatusServidor(pedido, novoStatus){
  const { error } = await sb.from('pedidos').update({ status: novoStatus }).eq('id', pedido.id);
  if(error){ alert('Não foi possível atualizar o pedido: ' + error.message); return false; }
  pedido.status = novoStatus;
  return true;
}

async function avancarStatus(){
  const pedido = pedidoPorId(pedidoAtualId);
  if(await atualizarStatusServidor(pedido, proximaEtapa(pedido.status))) renderModalAcompanhar();
}

const MOTIVOS_RECUSA = [
  'Agenda cheia no momento',
  'Fora da minha área de atendimento',
  'Não atendo mais esse tipo de serviço',
  'Máquina ou equipamento em manutenção',
  'Prazo solicitado é muito curto',
];

function abrirRecusaPedido(){
  document.getElementById('conteudo-modal').innerHTML =
    '<div class="rotulo-secao" style="margin-top:0">Por que você quer recusar?</div>'
    + '<div class="legenda-muted" style="margin-bottom:16px">Isso ajuda o agricultor a entender e buscar outra opção mais rápido.</div>'
    + '<div id="opcoes-motivo-recusa">'
      + MOTIVOS_RECUSA.map(m=>'<button type="button" class="botao botao-secundario botao-bloco" style="margin-bottom:8px;text-align:left" onclick="confirmarRecusa(\''+escaparHTML(m)+'\')">'+m+'</button>').join('')
      + '<button type="button" class="botao botao-secundario botao-bloco" style="margin-bottom:8px;text-align:left" onclick="mostrarCampoOutroMotivo()">Outro motivo</button>'
    + '</div>'
    + '<div id="campo-outro-motivo-container" class="oculto">'
      + '<div class="grupo-campo"><label for="campo-outro-motivo">Descreva o motivo</label><textarea id="campo-outro-motivo" placeholder="Explique rapidamente por que não pode atender"></textarea></div>'
      + '<button class="botao botao-trigo botao-bloco" onclick="confirmarRecusaComTexto()">Confirmar recusa</button>'
    + '</div>';
}

function mostrarCampoOutroMotivo(){
  document.getElementById('opcoes-motivo-recusa').classList.add('oculto');
  document.getElementById('campo-outro-motivo-container').classList.remove('oculto');
}

async function confirmarRecusaComTexto(){
  const texto = document.getElementById('campo-outro-motivo').value.trim();
  await confirmarRecusa(texto || 'Não informado');
}

async function confirmarRecusa(motivo){
  const pedido = pedidoPorId(pedidoAtualId);
  const { error } = await sb.from('pedidos').update({ status:'recusado', motivo_recusa: motivo }).eq('id', pedido.id);
  if(error){ alert('Não foi possível recusar o pedido: ' + error.message); return; }
  pedido.status = 'recusado';
  pedido.motivoRecusa = motivo;
  renderModalAcompanhar();
}

async function decidirPedido(novoStatus){
  const pedido = pedidoPorId(pedidoAtualId);
  if(await atualizarStatusServidor(pedido, novoStatus)) renderModalAcompanhar();
}

async function cancelarPedido(){
  const pedido = pedidoPorId(pedidoAtualId);
  if(!confirm('Tem certeza que deseja cancelar este pedido?')) return;
  if(await atualizarStatusServidor(pedido, 'cancelado')) renderModalAcompanhar();
}

function linkCombinar(pedido){
  if(!pedido.agricultorTelefone) return null;
  const msg = 'Olá! Recebi seu pedido de ' + catInfo(pedido.cat).rot + ' pelo CampoFácil. Vamos combinar o valor, uma data e outros detalhes?';
  return linkWhatsApp(pedido.agricultorTelefone, msg);
}

function renderModalAcompanhar(){
  const pedido = pedidoPorId(pedidoAtualId);
  const p = PRESTADORES.find(pr=>pr.id===pedido.prestadorId);
  const souOPrestador = !!meuCadastroPrestador && meuCadastroPrestador.id === pedido.prestadorId;
  const souOAgricultor = !!usuarioAtual && usuarioAtual.id === pedido.agricultorUserId;
  const statusNegativo = STATUS_TERMINAIS_NEGATIVOS[pedido.status];

  const temLocalizacaoExata = pedido.latitude != null && pedido.longitude != null;
  const mensagemZap = 'Olá, ' + p.nome + '! Fiz um pedido de ' + catInfo(pedido.cat).rot + ' pelo CampoFácil, em ' + pedido.local + '.'
    + (temLocalizacaoExata ? ' Localização exata: ' + linkMapa(pedido.latitude, pedido.longitude) : '');
  const linkZapAoPrestador = linkWhatsApp(p.telefone, mensagemZap);
  const botaoZapPrestador = linkZapAoPrestador ? '<a class="botao botao-trigo botao-bloco" href="'+linkZapAoPrestador+'" target="_blank" rel="noopener" style="margin-bottom:10px;text-decoration:none">'+iconeInline('whats',18)+' Avisar '+p.nome+' pelo WhatsApp</a>' : '';

  const linkCombinarZap = linkCombinar(pedido);
  const botaoCombinar = linkCombinarZap
    ? '<a class="botao botao-secundario botao-bloco" href="'+linkCombinarZap+'" target="_blank" rel="noopener" style="margin-bottom:10px;text-decoration:none">'+iconeInline('whats',18)+' Combinar detalhes pelo WhatsApp</a>'
    : '<div class="legenda-muted" style="margin-bottom:10px">O agricultor não informou telefone, então não é possível combinar pelo WhatsApp neste pedido.</div>';

  let corpoEtapas, botaoAcao;

  if(statusNegativo){
    const mensagemNegativa = (pedido.status === 'recusado' && pedido.motivoRecusa)
      ? 'Motivo informado pelo prestador: "'+escaparHTML(pedido.motivoRecusa)+'"'
      : statusNegativo.msg;
    corpoEtapas = '<div class="cartao" style="text-align:center"><div style="font-weight:800;color:'+statusNegativo.cor+'">'+statusNegativo.rot+'</div><div class="legenda-muted" style="margin-top:4px">'+mensagemNegativa+'</div></div>';
    botaoAcao = '';
  } else {
    const idxAtual = ETAPAS_PEDIDO.findIndex(e=>e.id===pedido.status);
    const etapasHTML = ETAPAS_PEDIDO.map((e,i)=>{
      const feita = i < idxAtual, atual = i === idxAtual;
      return '<div class="etapa '+(feita?'feita':'')+' '+(atual?'atual':'')+'"><div class="bolinha">'+((feita||atual)?iconeInline('check',13):'')+'</div><div class="texto"><div class="t">'+e.t+'</div><div class="d">'+e.d+'</div></div></div>';
    }).join('');
    corpoEtapas = '<div class="cartao"><div class="medidor-pedido"><div class="silo"><div class="enchimento" id="enchimento-silo"></div></div><div class="etapas-pedido">'+etapasHTML+'</div></div></div>';

    const concluido = pedido.status === 'concluido';
    if(concluido){
      if(souOAgricultor){
        const jaAvaliado = PEDIDOS_AVALIADOS.has(pedido.id);
        botaoAcao = jaAvaliado
          ? '<div class="legenda-muted" style="text-align:center;margin-top:6px">'+iconeInline('check',13)+' Você avaliou este prestador. Obrigado!</div>'
          : '<button class="botao botao-trigo botao-bloco" onclick="abrirAvaliacao('+pedido.id+')">Avaliar prestador</button>';
      } else {
        botaoAcao = '<button class="botao botao-secundario botao-bloco" disabled style="opacity:0.7">Pedido concluído ✓</button>';
      }
    } else if(souOPrestador){
      if(pedido.status === 'solicitado'){
        botaoAcao = botaoCombinar
          + '<div style="display:flex;gap:10px">'
            + '<button class="botao botao-trigo" style="flex:1" onclick="decidirPedido(\'aceito\')">Aceitar</button>'
            + '<button class="botao botao-secundario" style="flex:1;color:var(--perigo);border-color:var(--perigo)" onclick="abrirRecusaPedido()">Recusar</button>'
          + '</div>';
      } else {
        botaoAcao = botaoCombinar + '<button class="botao botao-trigo botao-bloco" onclick="avancarStatus()">Avançar etapa</button>';
      }
    } else if(souOAgricultor){
      const podeCancelar = pedido.status === 'solicitado';
      botaoAcao = botaoZapPrestador + (podeCancelar
        ? '<button class="botao botao-secundario botao-bloco" style="margin-bottom:10px" onclick="abrirEdicaoPedido()">Editar pedido</button>'
          + '<button class="botao botao-secundario botao-bloco" style="color:var(--perigo);border-color:var(--perigo)" onclick="cancelarPedido()">Cancelar pedido</button>'
        : '<div class="legenda-muted" style="text-align:center;margin-top:6px">O prestador já aceitou o pedido — para desmarcar, combine diretamente com ele.</div>');
    } else {
      botaoAcao = '<div class="legenda-muted" style="text-align:center;margin-top:6px">Aguardando o prestador atualizar o status.</div>';
    }
  }

  document.getElementById('conteudo-modal').innerHTML =
    '<div class="rotulo-secao" style="margin-top:0">Acompanhar pedido</div>'
    + '<div class="cartao" style="display:flex;gap:12px;align-items:center;text-align:left"><div class="avatar">'+iniciais(p.nome)+'</div><div><div style="font-weight:800">'+p.nome+'</div><div class="categoria-tag">'+catInfo(pedido.cat).rot+'</div></div></div>'
    + corpoEtapas
    + '<div class="pedido-resumo"><div class="linha"><span class="k">Local</span><span class="v">'+pedido.local+'</span></div>'
      + (temLocalizacaoExata ? '<div class="linha"><span class="k">Localização</span><span class="v"><a href="'+linkMapa(pedido.latitude, pedido.longitude)+'" target="_blank" rel="noopener">Ver no mapa</a></span></div>' : '')
      + (pedido.data ? '<div class="linha"><span class="k">Data</span><span class="v">'+formatarData(pedido.data)+'</span></div>' : '')
      + (pedido.obs ? '<div class="linha"><span class="k">Observações</span><span class="v">'+pedido.obs+'</span></div>' : '') + '</div>'
    + botaoAcao;

  if(!statusNegativo){
    const idxAtual = ETAPAS_PEDIDO.findIndex(e=>e.id===pedido.status);
    const pct = Math.round(((idxAtual+1)/ETAPAS_PEDIDO.length)*100);
    requestAnimationFrame(()=>{ const el = document.getElementById('enchimento-silo'); if(el) el.style.height = pct+'%'; });
  }
}

function abrirPedidoExistente(id){ pedidoAtualId = id; renderModalAcompanhar(); abrirModal(); }

/* ======================= AVALIAÇÕES ======================= */
let notaSelecionada = 0;

function abrirAvaliacao(pedidoId){
  const pedido = pedidoPorId(pedidoId);
  const p = PRESTADORES.find(pr=>pr.id===pedido.prestadorId);
  notaSelecionada = 0;
  document.getElementById('conteudo-modal').innerHTML =
    '<div class="rotulo-secao" style="margin-top:0">Avaliar '+(p?p.nome:'prestador')+'</div>'
    + '<div class="legenda-muted" style="margin-bottom:16px">'+catInfo(pedido.cat).rot+' · '+pedido.local+'</div>'
    + '<div id="estrelas-avaliacao" style="display:flex;gap:8px;justify-content:center;margin-bottom:20px"></div>'
    + '<div class="grupo-campo"><label for="campo-comentario-avaliacao">Comentário (opcional)</label><textarea id="campo-comentario-avaliacao" placeholder="Como foi o serviço?"></textarea></div>'
    + '<div id="mensagem-avaliacao" class="legenda-muted" style="min-height:18px"></div>'
    + '<button class="botao botao-primario botao-bloco" onclick="enviarAvaliacao('+pedido.id+','+pedido.prestadorId+')">Enviar avaliação</button>';
  renderEstrelasAvaliacao();
  abrirModal();
}

function renderEstrelasAvaliacao(){
  const alvo = document.getElementById('estrelas-avaliacao');
  if(!alvo) return;
  alvo.innerHTML = [1,2,3,4,5].map(n=>{
    const preenchida = n <= notaSelecionada;
    return '<button type="button" onclick="selecionarNota('+n+')" aria-label="'+n+' estrela(s)" style="background:none;border:none;cursor:pointer;padding:2px;color:'+(preenchida?'var(--trigo)':'var(--zinco-claro)')+'">'+iconeInline('estrela',32)+'</button>';
  }).join('');
}

function selecionarNota(n){ notaSelecionada = n; renderEstrelasAvaliacao(); }

async function enviarAvaliacao(pedidoId, prestadorId){
  const msg = document.getElementById('mensagem-avaliacao');
  if(notaSelecionada === 0){
    msg.textContent = 'Selecione de 1 a 5 estrelas.';
    msg.style.color = 'var(--perigo)';
    return;
  }
  const comentario = document.getElementById('campo-comentario-avaliacao').value.trim();
  msg.textContent = 'Enviando...';
  msg.style.color = 'var(--tinta-suave)';

  const { error } = await sb.from('avaliacoes').insert({
    pedido_id: pedidoId, prestador_id: prestadorId, agricultor_user_id: usuarioAtual.id,
    nota: notaSelecionada, comentario: comentario || null
  });

  if(error){
    msg.textContent = 'Não foi possível enviar: ' + error.message;
    msg.style.color = 'var(--perigo)';
    return;
  }

  PEDIDOS_AVALIADOS.add(pedidoId);
  // Atualiza a nota exibida na hora, sem precisar recarregar tudo do banco
  const p = PRESTADORES.find(pr=>pr.id===prestadorId);
  if(p){
    const totalAnterior = p.avaliacoes || 0;
    const notaAnterior = p.nota || 0;
    const novoTotal = totalAnterior + 1;
    p.nota = Math.round(((notaAnterior*totalAnterior + notaSelecionada) / novoTotal) * 10) / 10;
    p.avaliacoes = novoTotal;
  }
  fecharModal();
}

async function enviarFotoPrestador(inputEl){
  const arquivo = inputEl.files[0];
  if(!arquivo) return;
  const msg = document.getElementById('mensagem-foto-prestador');
  msg.textContent = 'Enviando...';
  msg.style.color = 'var(--tinta-suave)';

  const extensao = (arquivo.name.split('.').pop() || 'jpg').toLowerCase();
  const caminho = usuarioAtual.id + '/foto-' + Date.now() + '.' + extensao;

  const { error: erroUpload } = await sb.storage.from('fotos-prestadores').upload(caminho, arquivo, { upsert:true });
  if(erroUpload){
    msg.textContent = 'Não foi possível enviar a foto: ' + erroUpload.message;
    msg.style.color = 'var(--perigo)';
    return;
  }

  const { data: urlData } = sb.storage.from('fotos-prestadores').getPublicUrl(caminho);
  const { data, error } = await sb.from('prestadores')
    .update({ foto_url: urlData.publicUrl })
    .eq('id', meuCadastroPrestador.id)
    .select()
    .maybeSingle();

  if(error){
    msg.textContent = 'Não foi possível salvar a foto: ' + error.message;
    msg.style.color = 'var(--perigo)';
    return;
  }

  meuCadastroPrestador = data;
  msg.textContent = 'Foto atualizada!';
  msg.style.color = 'var(--tinta)';
  const p = PRESTADORES.find(pr=>pr.id===data.id);
  if(p) p.fotoUrl = data.foto_url;
}

async function salvarEdicaoPrestador(){
  const nome = document.getElementById('campo-prestador-nome').value.trim();
  const categoria_id = document.getElementById('campo-prestador-categoria').value;
  const cidade = document.getElementById('campo-prestador-cidade').value.trim();
  const raio_km = Number(document.getElementById('campo-prestador-raio').value) || 30;
  const telefone = document.getElementById('campo-prestador-telefone').value.trim();
  const extrasSelecionados = Array.from(document.querySelectorAll('.chk-servico-extra:checked')).map(el=>el.value);
  const msg = document.getElementById('mensagem-cadastro-prestador');

  if(!nome || !cidade){
    msg.textContent = 'Preencha ao menos o nome e a cidade.';
    msg.style.color = 'var(--perigo)';
    return;
  }

  msg.textContent = 'Salvando...';
  msg.style.color = 'var(--tinta-suave)';

  const { data, error } = await sb.from('prestadores')
    .update({ nome, categoria_id, cidade, raio_km, telefone })
    .eq('id', meuCadastroPrestador.id)
    .select()
    .maybeSingle();

  if(error){
    msg.textContent = 'Não foi possível salvar: ' + error.message;
    msg.style.color = 'var(--perigo)';
    return;
  }

  // Regrava as categorias extras do zero (mais simples que calcular a diferença)
  await sb.from('prestador_categorias').delete().eq('prestador_id', meuCadastroPrestador.id);
  const semDuplicarPrincipal = extrasSelecionados.filter(id => id !== categoria_id);
  if(semDuplicarPrincipal.length){
    await sb.from('prestador_categorias').insert(
      semDuplicarPrincipal.map(id => ({ prestador_id: meuCadastroPrestador.id, categoria_id: id }))
    );
  }

  meuCadastroPrestador = data;
  fecharModal();
  renderPerfilConta();
}


function renderPedidos(){
  const alvo = document.getElementById('tela-pedidos');
  if(PEDIDOS.length === 0){
    alvo.innerHTML = '<div class="rotulo-secao">Seus pedidos</div><div class="estado-vazio"><div class="ic">'+iconeInline('clip',28)+'</div>'
      + '<p>Você ainda não solicitou nenhum serviço. Vá até o início e escolha uma categoria para começar.</p>'
      + '<button class="botao botao-primario" onclick="trocarAba(\'tela-inicio\')">Ir para o início</button></div>';
    return;
  }

  const cardHTML = pedido => {
    const p = PRESTADORES.find(pr=>pr.id===pedido.prestadorId);
    const etapa = ETAPAS_PEDIDO.find(e=>e.id===pedido.status);
    const rotuloBadge = etapa ? etapa.t : (STATUS_TERMINAIS_NEGATIVOS[pedido.status] ? STATUS_TERMINAIS_NEGATIVOS[pedido.status].rot : pedido.status);
    return '<button class="cartao-pedido" onclick="abrirPedidoExistente('+pedido.id+')">'
      + '<div class="ic-cat">'+iconeInline(catInfo(pedido.cat).ic,20)+'</div>'
      + '<div class="miolo"><div class="titulo-pedido">'+(p?p.nome:'Prestador')+'</div><div class="sub-pedido">'+catInfo(pedido.cat).rot+' · '+pedido.local+'</div></div>'
      + '<span class="badge-status badge-'+pedido.status+'">'+rotuloBadge+'</span></button>';
  };

  if(!meuCadastroPrestador){
    alvo.innerHTML = '<div class="rotulo-secao">Seus pedidos</div><div class="grade-pedidos">' + PEDIDOS.map(cardHTML).join('') + '</div>';
    return;
  }

  // Quem também é prestador vê os dois lados separados: o que pediu como
  // agricultor, e o que recebeu como prestador (histórico de atendimentos).
  const comoAgricultor = PEDIDOS.filter(p => p.agricultorUserId === usuarioAtual.id);
  const comoPrestador = PEDIDOS.filter(p => p.prestadorId === meuCadastroPrestador.id);

  const concluidos = comoPrestador.filter(p=>p.status==='concluido').length;
  const aceitos = comoPrestador.filter(p=>['aceito','a_caminho','concluido'].includes(p.status)).length;
  const recusados = comoPrestador.filter(p=>p.status==='recusado').length;
  const decididos = aceitos + recusados;
  const taxaAceitacao = decididos > 0 ? Math.round((aceitos/decididos)*100)+'%' : '—';
  const statsPrestador = '<div class="cartao" style="display:flex;justify-content:space-around;text-align:center;margin-bottom:16px">'
    + '<div><div style="font-weight:800;font-size:20px">'+comoPrestador.length+'</div><div class="legenda-muted" style="font-size:12px">Recebidos</div></div>'
    + '<div><div style="font-weight:800;font-size:20px">'+concluidos+'</div><div class="legenda-muted" style="font-size:12px">Concluídos</div></div>'
    + '<div><div style="font-weight:800;font-size:20px">'+taxaAceitacao+'</div><div class="legenda-muted" style="font-size:12px">Taxa de aceitação</div></div>'
    + '</div>';

  alvo.innerHTML =
    '<div class="rotulo-secao">Meus atendimentos (como prestador)</div>'
    + statsPrestador
    + (comoPrestador.length ? '<div class="grade-pedidos">' + comoPrestador.map(cardHTML).join('') + '</div>' : '<div class="legenda-muted" style="margin-bottom:20px">Nenhum pedido recebido ainda.</div>')
    + '<div class="rotulo-secao" style="margin-top:24px">Meus pedidos (como agricultor)</div>'
    + (comoAgricultor.length ? '<div class="grade-pedidos">' + comoAgricultor.map(cardHTML).join('') + '</div>' : '<div class="legenda-muted">Você ainda não solicitou nenhum serviço.</div>');
}

  }

      + '<div style="font-weight:800">Meu cadastro de prestador</div>'
      + '<div class="categoria-tag">'+(c?c.rot:meuCadastroPrestador.categoria_id)+' · '+meuCadastroPrestador.cidade+'</div>'
      + '<div style="margin-top:6px;font-weight:700;color:var(--zinco)">Desativado — você não aparece mais nas buscas</div>'
      + '<button class="botao botao-secundario botao-bloco" style="margin-top:12px" onclick="reativarCadastroPrestador()">Reativar cadastro</button>'
      + '</div>';
  }
  if(meuCadastroPrestador.status === 'pausado'){
    const c = catInfo(meuCadastroPrestador.categoria_id);
    return '<div class="cartao" style="margin-bottom:16px">'
      + '<div style="font-weight:800">Meu cadastro de prestador</div>'
      + '<div class="categoria-tag">'+(c?c.rot:meuCadastroPrestador.categoria_id)+' · '+meuCadastroPrestador.cidade+'</div>'
      + '<div style="margin-top:6px;font-weight:700;color:var(--zinco)">Pausado temporariamente — você não aparece nas buscas até retomar</div>'
      + '<button class="botao botao-trigo botao-bloco" style="margin-top:12px" onclick="retomarAtendimento()">Retomar atendimento</button>'
      + '</div>';
  }
  const statusTexto = { pendente:'Aguardando aprovação', aprovado:'Aprovado ✓', recusado:'Cadastro recusado' }[meuCadastroPrestador.status] || meuCadastroPrestador.status;
  const c = catInfo(meuCadastroPrestador.categoria_id);
  return '<button class="cartao" style="margin-bottom:8px;text-align:left;width:100%;cursor:pointer" onclick="abrirEdicaoPrestador()">'
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start">'
      + '<div><div style="font-weight:800">Meu cadastro de prestador</div>'
      + '<div class="categoria-tag">'+(c?c.rot:meuCadastroPrestador.categoria_id)+' · '+meuCadastroPrestador.cidade+'</div>'
      + '<div style="margin-top:6px;font-weight:700">'+statusTexto+'</div></div>'
      + '<span style="color:var(--zinco)">'+iconeInline('seta',18)+'</span>'
    + '</div></button>'
    + (meuCadastroPrestador.status === 'aprovado' ? '<button class="botao botao-secundario botao-bloco" style="margin-bottom:16px" onclick="pausarAtendimento()">Pausar atendimento temporariamente</button>' : '');

async function pausarAtendimento(){

function abrirEdicaoPropriedade(){
  const meta = usuarioAtual.user_metadata || {};

  const temLocalizacao = meta.propriedadeLat != null && meta.propriedadeLon != null;
  document.getElementById('conteudo-modal').innerHTML =
    '<div class="rotulo-secao" style="margin-top:0">Minha propriedade e localização</div>'
    + '<div class="legenda-muted" style="margin-bottom:20px">Salve aqui uma vez e ela preenche seus pedidos automaticamente — sem precisar capturar o GPS toda vez.</div>'
    + '<div class="grupo-campo"><label for="campo-propriedade-nome">Nome ou referência da propriedade</label><input id="campo-propriedade-nome" type="text" value="'+localAtual+'" placeholder="Ex.: Linha Buriti Sul, Sítio do pai"></div>'
    + '<div class="grupo-campo"><label>Localização exata (GPS)</label>'
      + '<button type="button" class="botao botao-secundario botao-bloco" onclick="capturarLocalizacaoPropriedade()">'+iconeInline('pino',18)+' Usar minha localização atual</button>'
      + '<div id="status-local-propriedade" class="legenda-muted" style="margin-top:6px">'
        + (temLocalizacao ? iconeInline('check',13)+' Localização salva — <a href="'+linkMapa(meta.propriedadeLat, meta.propriedadeLon)+'" target="_blank" rel="noopener">ver no mapa</a>' : 'Nenhuma localização salva ainda.')
      + '</div>'
    + '</div>'
    + '<div id="mensagem-propriedade" class="legenda-muted" style="min-height:18px"></div>'
    + '<button class="botao botao-primario botao-bloco" onclick="salvarPropriedade()">Salvar</button>';
  localizacaoPropriedadeCapturada = temLocalizacao ? { lat: meta.propriedadeLat, lon: meta.propriedadeLon } : null;
  abrirModal();

let localizacaoPropriedadeCapturada = null;

function capturarLocalizacaoPropriedade(){
  const status = document.getElementById('status-local-propriedade');
  if(!navigator.geolocation){ status.textContent = 'Seu navegador não suporta captura de localização.'; status.style.color = 'var(--perigo)'; return; }
  status.textContent = 'Obtendo localização...';
  status.style.color = 'var(--tinta-suave)';
  navigator.geolocation.getCurrentPosition(
    pos => {
      localizacaoPropriedadeCapturada = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      status.innerHTML = iconeInline('check',13) + ' Localização capturada — <a href="'+linkMapa(localizacaoPropriedadeCapturada.lat, localizacaoPropriedadeCapturada.lon)+'" target="_blank" rel="noopener">ver no mapa</a>';
      status.style.color = 'var(--tinta)';
    },
    () => { status.textContent = 'Não foi possível obter a localização. Verifique a permissão de GPS.'; status.style.color = 'var(--perigo)'; },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

async function salvarPropriedade(){
  const propriedadeLocal = document.getElementById('campo-propriedade-nome').value.trim();
  const msg = document.getElementById('mensagem-propriedade');
  msg.textContent = 'Salvando...';
  msg.style.color = 'var(--tinta-suave)';
  const { data, error } = await sb.auth.updateUser({
    data: {
      ...(usuarioAtual.user_metadata||{}),
      propriedadeLocal,
      propriedadeLat: localizacaoPropriedadeCapturada ? localizacaoPropriedadeCapturada.lat : null,
      propriedadeLon: localizacaoPropriedadeCapturada ? localizacaoPropriedadeCapturada.lon : null
    }
  });
  if(error){
    msg.textContent = 'Não foi possível salvar: ' + error.message;
    msg.style.color = 'var(--perigo)';
    return;
  }
  usuarioAtual = data.user;
  fecharModal();
}

async function carregarModeracao(){

function baixarCSV(linhas, colunas, nomeArquivo){
  const cabecalho = colunas.join(';');
  const corpo = linhas.map(l => colunas.map(c => {
    let v = l[c];
    if(v == null) v = '';
    v = String(v).replace(/"/g,'""');
    if(v.indexOf(';') !== -1 || v.indexOf('"') !== -1 || v.indexOf('\n') !== -1) v = '"'+v+'"';
    return v;
  }).join(';')).join('\n');
  const csv = cabecalho + '\n' + corpo;
  const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nomeArquivo;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function exportarPrestadoresCSV(){
  const { data, error } = await sb.from('prestadores').select('*');
  if(error){ alert('Não foi possível exportar: ' + error.message); return; }
  baixarCSV(data, ['id','nome','categoria_id','cidade','raio_km','nota','avaliacoes','servicos_concluidos','status','telefone','criado_em'], 'campofacil_prestadores.csv');

async function exportarPedidosCSV(){

async function contarPrestadoresAprovados(){
  const { count, error } = await sb.from('prestadores').select('*', { count:'exact', head:true }).eq('status','aprovado');
  if(error){ console.error(error); return '—'; }
  return count;
}

async function calcularEstatisticasPedidos(){
  const { data, error } = await sb.from('pedidos').select('agricultor_user_id, status, criado_em');
  if(error){ console.error('Erro ao calcular estatísticas de pedidos:', error); return { agricultoresAtivos:'—', pedidosMes:'—', taxaAceitacao:'—' }; }

  const agricultoresUnicos = new Set(data.map(p=>p.agricultor_user_id).filter(Boolean));

  const inicioMes = new Date();
  inicioMes.setDate(1); inicioMes.setHours(0,0,0,0);
  const pedidosMes = data.filter(p => new Date(p.criado_em) >= inicioMes).length;

  const aceitos = data.filter(p => ['aceito','a_caminho','concluido'].includes(p.status)).length;
  const recusados = data.filter(p => p.status === 'recusado').length;
  const decididos = aceitos + recusados;
  const taxaAceitacao = decididos > 0 ? Math.round((aceitos/decididos)*100) + '%' : '—';

  return {
    agricultoresAtivos: String(agricultoresUnicos.size),
    pedidosMes: String(pedidosMes),
    taxaAceitacao
  };
}

    + '<div class="bloco-painel"><h2>Cadastros aguardando aprovação</h2><div class="lista-moderacao" id="lista-moderacao"></div></div>';
  renderModeracao();

function cartaoEstat(rot, num, delta){ return '<div class="cartao-estat"><div class="rot">'+rot+'</div><div class="num">'+num+'</div><div class="delta">'+delta+'</div></div>'; }
function renderModeracao(){

    document.getElementById('lista-moderacao').innerHTML = '<div class="legenda-muted" style="padding:12px 0">Nenhum cadastro aguardando aprovação no momento.</div>';

  document.getElementById('lista-moderacao').innerHTML = MODERACAO.map(m=>{
    const acoes = '<div class="acoes"><button class="btn-mini aprovar" onclick="decidirModeracao('+m.id+',\'aprovado\')">Aprovar</button><button class="btn-mini recusar" onclick="decidirModeracao('+m.id+',\'recusado\')">Recusar</button></div>';
    return '<div class="item-mod"><div class="miolo"><div class="nome">'+m.nome+'</div><div class="meta">'+catInfo(m.cat).rot+' · '+m.cidade+'</div></div>'+acoes+'</div>';
  }).join('');
}
async function decidirModeracao(id, status){
